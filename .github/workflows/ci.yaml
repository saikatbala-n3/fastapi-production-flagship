name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: api
          POSTGRES_PASSWORD: api
          POSTGRES_DB: test_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: postgresql+asyncpg://api:api@localhost:5432/test_api
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --cov=app --cov-report=term-missing
